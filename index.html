<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex Dominion IO</title>
<style>
  body {
    margin: 0;
    background: #0b183d;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
  }
  h1 {
    margin: 24px 0 12px;
    font-size: 32px;
  }
  .ui {
    margin-bottom: 16px;
  }
  .row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin: 6px 0;
    flex-wrap: wrap;
  }
  input, select, button {
    font-size: 14px;
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
  }
  .info {
    font-size: 15px;
    line-height: 1.7;
  }
  #ranking {
    margin-top: 8px;
    line-height: 1.6;
    font-size: 14px;
    min-height: 96px;
  }
  #board {
    position: relative;
    width: 900px;
    height: 720px;
    margin: 0 auto 20px;
    overflow: hidden;
  }
  .hex {
    position: absolute;
    width: 42px;
    height: 36px;
    background: #7b8494;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
  }
  .player {
    box-shadow: inset 0 0 0 2px white, 0 0 8px rgba(255,255,255,0.35);
  }
  .dead {
    background: #111827 !important;
    cursor: not-allowed;
    border-color: rgba(255,255,255,0.08);
  }
</style>
</head>
<body>

<h1>Hex Dominion IO</h1>

<div class="ui">
  <div class="row">
    <input id="id" placeholder="학번">
    <button id="startBtn">시작</button>
  </div>

  <div class="info">
    <div>내 소속 반: <span id="myTeam">-</span></div>
    <div>내 점령 칸 수: <span id="myCount">0</span></div>
    <div>돈: <span id="money">0</span></div>
    <div>연결 상태: <span id="conn">연결 중...</span></div>
  </div>

  <div class="row">
    <select id="action">
      <option value="claim">점령 - 인접 빈 땅 (50)</option>
      <option value="capture">탈취 - 인접 적 땅 (200)</option>
      <option value="remote">원거리 - 아무 땅 (500)</option>
      <option value="destroy">파괴 - 적 땅 비활성화 (250)</option>
    </select>
    <button id="moneyBtn">+1</button>
  </div>

  <div id="ranking"></div>
</div>

<div id="board"></div>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script>
  // Render에 서버 배포 후 이 주소를 네 실제 주소로 바꿔
  const SERVER_URL = "https://april-fool-s-day-game.onrender.com";
  const socket = io(SERVER_URL, {
    transports: ["websocket", "polling"]
  });

  const HEX_W = 42;
  const HEX_H = 36;
  const H_STEP = HEX_W * 0.75;
  const V_STEP = HEX_H;
  const RADIUS = 10;

  const CLAIM_COST = 50;
  const CAPTURE_COST = 200;
  const REMOTE_COST = 500;
  const DESTROY_COST = 250;

  const colors = {
    blue: "#3b82f6",
    red: "#ef4444",
    green: "#22c55e",
    yellow: "#f59e0b"
  };

  const teamNames = {
    blue: "1반",
    red: "2반",
    green: "3반",
    yellow: "4반"
  };

  let tiles = {};
  let money = 0;
  let myTeam = null;
  let started = false;

  function key(q, r) {
    return `${q},${r}`;
  }

  function neighbors(tile) {
    const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
    return dirs
      .map(([dq, dr]) => tiles[key(tile.q + dq, tile.r + dr)])
      .filter(Boolean);
  }

  function hasAdjacentMine(tile) {
    return neighbors(tile).some(n => n.active && n.owner === myTeam);
  }

  function render() {
    renderBoard();
    renderInfo();
    renderRanking();
  }

  function renderBoard() {
    const board = document.getElementById("board");
    board.innerHTML = "";

    const centerX = 450;
    const centerY = 320;

    Object.values(tiles).forEach(tile => {
      const div = document.createElement("div");
      div.className = "hex";

      const x = tile.q * H_STEP + centerX;
      const y = tile.r * V_STEP + tile.q * (HEX_H / 2) + centerY;

      div.style.left = x + "px";
      div.style.top = y + "px";

      if (!tile.active) {
        div.classList.add("dead");
      } else if (tile.owner) {
        div.style.background = colors[tile.owner];
      }

      if (tile.active && tile.owner === myTeam) {
        div.classList.add("player");
      }

      div.onclick = () => handleTileClick(tile);
      board.appendChild(div);
    });
  }

  function renderInfo() {
    document.getElementById("money").innerText = money;
    document.getElementById("myTeam").innerText = myTeam ? teamNames[myTeam] : "-";

    let count = 0;
    Object.values(tiles).forEach(tile => {
      if (tile.active && tile.owner === myTeam) count++;
    });
    document.getElementById("myCount").innerText = count;
  }

  function renderRanking() {
    const counts = { blue: 0, red: 0, green: 0, yellow: 0 };

    Object.values(tiles).forEach(tile => {
      if (tile.active && tile.owner) counts[tile.owner]++;
    });

    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

    document.getElementById("ranking").innerHTML =
      "<b>실시간 순위</b><br>" +
      sorted.map(([team, count], i) =>
        `${i + 1}. ${teamNames[team]}${team === myTeam ? " (나)" : ""}: ${count}칸`
      ).join("<br>");
  }

  function handleTileClick(tile) {
    if (!started || !tile.active) return;

    const action = document.getElementById("action").value;
    socket.emit("tileAction", {
      action,
      q: tile.q,
      r: tile.r,
      team: myTeam
    });
  }

  document.getElementById("startBtn").onclick = () => {
    const id = document.getElementById("id").value.trim();
    if (id.length < 2) return;

    const teamMap = { "1": "blue", "2": "red", "3": "green", "4": "yellow" };
    myTeam = teamMap[id[1]];
    if (!myTeam) return;

    started = true;
    money = 0;
    socket.emit("joinGame", { team: myTeam });
    render();
  };

  document.getElementById("moneyBtn").onclick = () => {
    if (!started) return;
    money++;
    renderInfo();
  };

  socket.on("connect", () => {
    document.getElementById("conn").innerText = "연결됨";
  });

  socket.on("disconnect", () => {
    document.getElementById("conn").innerText = "끊김";
  });

  socket.on("gameState", (state) => {
    tiles = state.tiles;
    render();
  });

  socket.on("actionRejected", (msg) => {
    console.log(msg);
  });
</script>

</body>
</html>
